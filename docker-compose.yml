services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: sol
      POSTGRES_PASSWORD: sol
      POSTGRES_DB: sol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sol -d sol"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
