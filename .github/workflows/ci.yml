name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zig-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install libxml2
        run: sudo apt-get install -y libxml2-dev
      - name: Unit tests
        run: |
          zig build test-seo
          zig build test-wcag
          zig build test-perf
          zig build test-cookies
          zig build test-keywords
          zig build test-aeo
          zig build test-scorer
          zig build test-robots
          zig build test-sitemap
          zig build test-audit
          zig build test-baseline
          zig build test-psi
          zig build test-builtwith

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install deps
        run: cd web && bun install
      - name: Unit tests
        run: cd web && bunx vitest run
      - name: Build
        run: cd web && bun run build

  api-contract:
    runs-on: ubuntu-latest
    needs: zig-unit
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: sol
          POSTGRES_PASSWORD: sol
          POSTGRES_DB: sol
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install libxml2
        run: sudo apt-get install -y libxml2-dev
      - name: Build
        run: zig build
      - name: Install hurl
        run: |
          HURL_VERSION=6.1.1
          curl -sL "https://github.com/Orange-OpenSource/hurl/releases/download/${HURL_VERSION}/hurl_${HURL_VERSION}_amd64.deb" -o hurl.deb
          sudo dpkg -i hurl.deb
      - name: Start sol-server
        env:
          DATABASE_URL: postgresql://sol:sol@localhost:5432/sol
          JWT_SECRET: ci-test-secret-do-not-use-in-prod-x
        run: |
          DATABASE_URL=$DATABASE_URL JWT_SECRET=$JWT_SECRET \
            ./zig-out/bin/sol-server --port 8090 &
          sleep 3
          curl -sf http://localhost:8090/health || exit 1
      - name: API contract tests
        run: |
          hurl --test \
            --variable base_url=http://localhost:8090 \
            tests/api/health.hurl \
            tests/api/auth.hurl \
            tests/api/projects.hurl \
            tests/api/errors.hurl
      - name: Audit API test
        run: |
          hurl --test \
            --variable base_url=http://localhost:8090 \
            tests/api/audit.hurl
        timeout-minutes: 2

  e2e:
    runs-on: ubuntu-latest
    needs: [api-contract, frontend-unit]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: sol
          POSTGRES_PASSWORD: sol
          POSTGRES_DB: sol
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - uses: oven-sh/setup-bun@v2
      - name: Install libxml2
        run: sudo apt-get install -y libxml2-dev
      - name: Build server
        run: zig build
      - name: Install frontend deps
        run: cd web && bun install
      - name: Start sol-server
        env:
          DATABASE_URL: postgresql://sol:sol@localhost:5432/sol
          JWT_SECRET: ci-test-secret-do-not-use-in-prod-x
        run: |
          DATABASE_URL=$DATABASE_URL JWT_SECRET=$JWT_SECRET \
            ./zig-out/bin/sol-server --port 8090 &
          sleep 3
          curl -sf http://localhost:8090/health || exit 1
      - name: Build + start Astro preview
        run: |
          cd web
          PUBLIC_API_URL=http://localhost:8090 bun run build
          bunx astro preview --port 4321 &
          sleep 3
          curl -sf http://localhost:4321/ || exit 1
      - name: Install Playwright
        run: cd web && bunx playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd web && bunx playwright test
        env:
          BASE_URL: http://localhost:4321
          API_URL: http://localhost:8090
